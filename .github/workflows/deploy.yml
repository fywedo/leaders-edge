name: Deploy Leaders Edge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node / pnpm ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: src/frontend
        env:
          VITE_FB_PIXEL_ID: ${{ secrets.VITE_FB_PIXEL_ID }}
        run: pnpm build

      # ── PHP / Composer ───────────────────────────────────────────────────────
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── Assemble deploy artifact ─────────────────────────────────────────────
      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          cp -r src/frontend/dist/. deploy/
          cp -r api deploy/api
          cp -r vendor deploy/vendor
          cp .htaccess deploy/.htaccess
          mkdir -p deploy/pdfs_private
          cp pdfs_private/.htaccess deploy/pdfs_private/.htaccess

      # ── FTP upload ───────────────────────────────────────────────────────────
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /

